<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Password Genarate</title>
    <link rel="stylesheet" href="src/styles/layout.css" type="text/css" />
    <link rel="stylesheet" href="src/styles/themes/discord.css" type="text/css"/>
    <link rel="stylesheet" href="src/styles/themes/netflix.css" type="text/css"/>
    <link rel="stylesheet" href="src/styles/themes/spotify.css" type="text/css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
<div class="container">
    <div class="theme-selector">
      <label><input type="radio" name="theme" value="netflix" /> NETFLIX</label>
      <label><input type="radio" name="theme" value="discord" /> DISCORD</label>
      <label><input type="radio" name="theme" value="spotify" /> SPOTIFY</label>
    </div>

  <div class="main-content">
    <div class="titles">
      <h1>Password Genarate</h1>
      <h3>
        Online password generator tool to instantly create a secure password
      </h3>
    </div>

    <div class="input-group">
      <input type="text" class="password-label" id="password-label" />
      <button id="copy-button">copy</button>
      <div class="progress">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    </div>
    
    <div class="password-settings">
      <div class="slider-group">
        <input
          type="range"
          value="4"
          min="4"
          max="32"
          class="slider-range"
          id="password-length"
        />
      <span id="slider-value">4</span>
      </div>
    <div class="checkbox-preferences">
      <label> <input
        type="checkbox"
        id="checkbox-1"
        name="UpperCase"
        value="UpperCase"
      />UpperCase Letters</label>  
      <label> <input
        type="checkbox"
        id="checkbox-2"
        name="LowerCase"
        value="LowerCase"
      />LowerCase Letters</label>
      <label> <input
        type="checkbox"
        id="checkbox-3"
        name="Numbers"
        value="Numbers"
      />Numbers</label>     
      <label> <input
        type="checkbox"
        id="checkbox-4"
        name="Symbols"
        value="Symbols"
      />Symbols</label>
    </div>
      <p id="error-alert"></p>
      <button id="generate-button">GENERATE</button>
    </div>
  </div>
</div>
    <script src="src/js/script.js"></script>
  </body>
</html>
